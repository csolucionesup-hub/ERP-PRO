# nixpacks.toml — configuración explícita de build para Railway
# Fuerza regeneración completa de dist/ en cada build.

[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = [
  "rm -rf dist",
  "npx tsc --listFiles --diagnostics",
  "ls -la dist/ | head -20",
  "test -f dist/index.js || (echo 'FATAL: dist/index.js missing after build' && exit 1)"
]

[start]
cmd = "npm start"
