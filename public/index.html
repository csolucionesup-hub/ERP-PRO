<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Pro System</title>
    <!-- Premium Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';">
    <link rel="stylesheet" href="./css/main.css?v=20260426m">
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.log('%c [GLOBAL ERROR] ', 'background: #f00; color: #fff', msg, 'at', lineNo + ':' + columnNo);
            const root = document.getElementById('root');
            if (root) root.innerHTML = `<div style="padding:50px; color:red;"><h3>Error de Aplicación</h3><p>${msg}</p></div>`;
            return false;
        };
    </script>
</head>
<body>
    <div id="root">
        <!-- Renderizado principal de la SPA (React style) -->
    </div>

    <!-- Librerías locales (NO CDN) -->
    <script src="./lib/chart.min.js"></script>

    <!-- Cargamos como módulo para importar/exportar componentes nativamente -->
    <script type="module" src="./js/app.js?v=20260426m"></script>
</body>
</html>
