<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar — Metal Engineers ERP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
    }

    .login-logo {
      display: flex;
      justify-content: center;
    }

    .login-logo img {
      max-width: 200px;
      height: auto;
    }

    .login-title {
      font-size: 18px;
      font-weight: 600;
      color: #333333;
      text-align: center;
      letter-spacing: 0.3px;
    }

    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #d9dad9;
      border-radius: 8px;
      font-size: 14px;
      color: #000000;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #676767;
    }

    input::placeholder {
      color: #a5a5a6;
    }

    .pwd-wrapper {
      position: relative;
    }

    .pwd-wrapper input {
      padding-right: 44px;
    }

    .pwd-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #a5a5a6;
      font-size: 18px;
      user-select: none;
      line-height: 1;
    }

    .pwd-toggle:hover {
      color: #676767;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background-color: #676767;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 4px;
    }

    button[type="submit"]:hover {
      background-color: #000000;
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-msg {
      color: #ee5d50;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="/img/logo-metal.png" alt="Metal Engineers" />
    </div>
    <p class="login-title">Sistema de Gestión</p>
    <form id="login-form">
      <input type="email" id="email" placeholder="Correo electrónico" required autocomplete="email" />
      <div class="pwd-wrapper">
        <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password" />
        <span class="pwd-toggle" id="pwd-toggle" title="Mostrar/ocultar contraseña">👁</span>
      </div>
      <p class="error-msg" id="error-msg">Credenciales incorrectas</p>
      <button type="submit" id="submit-btn">Ingresar</button>
    </form>
  </div>

  <script>
    // Toggle contraseña
    document.getElementById('pwd-toggle').addEventListener('click', () => {
      const input = document.getElementById('password');
      const toggle = document.getElementById('pwd-toggle');
      if (input.type === 'password') {
        input.type = 'text';
        toggle.textContent = '🙈';
      } else {
        input.type = 'password';
        toggle.textContent = '👁';
      }
    });

    // Si ya hay token, redirigir al sistema
    if (localStorage.getItem('erp_token')) {
      window.location.replace('/');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      errorMsg.classList.remove('visible');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Error de autenticación');
        }

        localStorage.setItem('erp_token', data.token);
        localStorage.setItem('erp_user', JSON.stringify(data.usuario));
        window.location.replace('/');
      } catch {
        errorMsg.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
